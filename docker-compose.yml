services:
  semantic-firewall:
    build: .
    container_name: openbot-firewall
    privileged: true # Required for LD_PRELOAD hook injection
    stdin_open: true # Keep stdin open for OpenClaw onboarding wizard
    tty: true # Allocate a TTY so interactive prompts render correctly
    env_file:
      - .env
    volumes:
      - ~/.openclaw:/root/.openclaw # Persist OpenClaw config to host after onboarding
      - ./telemetry:/app/telemetry # Hot-reload python scripts without rebuild
    ports:
      - "18789:18789" # OpenClaw WebSocket Gateway   (host → container)
      - "18791:18791" # OpenClaw Browser Control UI  (host → container) ← open this in browser
      - "5005:5005" # Webhook Server               (host → container)
      - "5006:5006" # ML Threat Analyzer           (host → container)
    # NOTE: Container cannot reach host ports by default.
    # This creates the VM-like asymmetric trust boundary:
    #   Host  →  Container : open (via the above published ports)
    #   Container → Host   : blocked unless host explicitly forwards a socket
