services:
  semantic-firewall:
    build: .
    container_name: openbot-firewall
    privileged: true # Potentially needed for LD_PRELOAD or specific device passing
    environment:
      - LD_PRELOAD=/app/interceptor/hook.so
      - SPLUNK_HEC_URL=https://http-inputs-prd-p-vkh7t.splunkcloud.com/services/collector/event
      - SPLUNK_HEC_TOKEN=0290899f-ecea-44a1-84a8-567e17c64d38
    volumes:
      - ~/.openclaw:/root/.openclaw # Persist OpenClaw configs to host
    ports:
      - "18789:18789" # OpenClaw API
      - "5005:5005" # Flask Webhook Server
  # The React Dashboard would usually run independently or hosted on Firebase,
  # but we can optionally serve it via node if we wanted to package it together.
