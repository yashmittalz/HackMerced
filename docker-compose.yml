    tty: true # Allocate a TTY so interactive prompts render correctly
    env_file:
      - .env
    volumes:
      - ~/.openclaw:/root/.openclaw # Persist OpenClaw config to host after onboarding
      - ./telemetry:/app/telemetry # Hot-reload python scripts without rebuild
